<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宏观对冲战情室 Quant Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0b1120; color: #f8fafc; overflow-x: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        .link-hover:hover { color: #60a5fa; cursor: pointer; }
    </style>
</head>
<body class="min-h-screen p-4 xl:p-6 flex flex-col gap-4">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-2">
        <div>
            <h1 class="text-2xl font-bold flex items-center gap-3 text-slate-100">
                <i data-lucide="monitor" class="text-emerald-500"></i> Macro War Room 
            </h1>
            <div id="update-time" class="text-xs font-mono text-emerald-400 mt-1">连接中...</div>
        </div>
        
        <div class="flex items-center gap-2 bg-slate-900 border border-slate-700 p-1 rounded-lg" id="time-filters">
            <button class="time-btn px-3 py-1 text-xs font-mono text-slate-400 hover:text-white rounded" data-days="7">1W</button>
            <button class="time-btn px-3 py-1 text-xs font-mono bg-slate-700 text-white rounded shadow" data-days="30">1M</button>
            <button class="time-btn px-3 py-1 text-xs font-mono text-slate-400 hover:text-white rounded" data-days="90">3M</button>
            <button class="time-btn px-3 py-1 text-xs font-mono text-slate-400 hover:text-white rounded" data-days="365">1Y</button>
        </div>
    </header>

    <section class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div class="glass-panel rounded-xl p-4 flex flex-col justify-between border-purple-500/30">
            <div class="text-slate-400 text-[11px] font-medium mb-2">VIX 恐慌指数</div>
            <div class="flex justify-between items-end">
                <div class="text-2xl font-bold font-mono text-purple-400" id="val-vix">--</div>
                <svg width="60" height="25" class="stroke-purple-400 fill-none" stroke-width="1.5"><path id="path-vix" d="" /></svg>
            </div>
        </div>
        
        <div class="glass-panel rounded-xl p-4 flex flex-col justify-between border-purple-500/30">
            <div class="text-slate-400 text-[11px] font-medium mb-2">SKEW 黑天鹅偏度</div>
            <div class="flex justify-between items-end">
                <div class="text-2xl font-bold font-mono text-purple-400" id="val-skew">--</div>
                <svg width="60" height="25" class="stroke-purple-400 fill-none" stroke-width="1.5"><path id="path-skew" d="" /></svg>
            </div>
        </div>

        <div class="glass-panel rounded-xl p-4 flex flex-col justify-between border-red-500/30">
            <div class="text-slate-400 text-[11px] font-medium mb-2">SPX GEX 做市商敞口</div>
            <div class="flex justify-between items-end">
                <div class="text-2xl font-bold font-mono text-red-400" id="val-gex">--</div>
                <svg width="60" height="25" class="stroke-red-400 fill-none" stroke-width="1.5"><path id="path-gex" d="" /></svg>
            </div>
        </div>

        <div class="glass-panel rounded-xl p-4 flex flex-col justify-between border-blue-500/30">
            <div class="text-slate-400 text-[11px] font-medium mb-2">DIX 暗池买盘</div>
            <div class="flex justify-between items-end">
                <div class="text-2xl font-bold font-mono text-blue-400" id="val-dix">--</div>
                <svg width="60" height="25" class="stroke-blue-400 fill-none" stroke-width="1.5"><path id="path-dix" d="" /></svg>
            </div>
        </div>
    </section>

    <main class="grid grid-cols-1 lg:grid-cols-12 gap-4 flex-1 mt-2">
        <section class="col-span-1 lg:col-span-6 flex flex-col gap-4">
            <div class="glass-panel rounded-xl p-4 flex-1 flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b border-slate-700 pb-2">
                    <h2 class="text-sm font-bold text-slate-300 flex items-center gap-2">
                        <i data-lucide="flame" class="w-4 h-4 text-amber-500"></i> Polymarket 预期异动 (聪明钱博弈)
                    </h2>
                </div>
                <div class="space-y-4 overflow-y-auto pr-2 custom-scrollbar flex-1" id="poly-container">
                    <div class="text-xs text-slate-500 animate-pulse">正在读取数据...</div>
                </div>
            </div>
        </section>

        <aside class="col-span-1 lg:col-span-6 flex flex-col gap-4">
            <div class="glass-panel rounded-xl p-0 flex-1 flex flex-col overflow-hidden border-t-2 border-t-slate-700">
                <div class="p-4 border-b border-slate-800/50 bg-slate-900/40">
                    <h2 class="text-sm font-bold text-slate-500 flex items-center gap-2">
                        <i data-lucide="cpu" class="w-4 h-4"></i> AI 跨市场传导推演
                    </h2>
                </div>
                <div class="p-6 flex-1 flex flex-col items-center justify-center text-center">
                    <i data-lucide="lock" class="w-12 h-12 text-slate-600 mb-3"></i>
                    <h3 class="text-slate-400 font-bold mb-2">模型暂未接入</h3>
                    <p class="text-xs text-slate-500 leading-relaxed">系统已完成数据底座搭建。<br/>等待后续版本接入 DeepSeek-R1 生成非对称期权策略。</p>
                </div>
            </div>
        </aside>
    </main>

    <script>
        lucide.createIcons();
        let globalData = []; // 浏览器的本地微型数据库

        // 画迷你趋势线 (Sparkline) 的核心数学函数
        function generateSvgPath(dataArray, width = 60, height = 25) {
            if (!dataArray || dataArray.length < 2) return "";
            const min = Math.min(...dataArray);
            const max = Math.max(...dataArray);
            const range = (max - min) || 1; // 防止除以 0
            const stepX = width / (dataArray.length - 1);
            
            // 翻转 Y 轴（因为 SVG 坐标系向下为正）
            let path = `M 0 ${height - ((dataArray[0] - min) / range) * height}`;
            for (let i = 1; i < dataArray.length; i++) {
                path += ` L ${i * stepX} ${height - ((dataArray[i] - min) / range) * height}`;
            }
            return path;
        }

        // 切分数据并重绘趋势图
        function updateCharts(days) {
            // 切割数组：取最后 N 天的数据
            const slicedData = globalData.slice(-Math.min(days, globalData.length));
            
            // 如果数据连2天都不到，就不画图了
            if (slicedData.length < 2) return;

            // 提取出各个指标的纯数字数组
            const vixData = slicedData.map(d => d.metrics.vix);
            const skewData = slicedData.map(d => d.metrics.skew);
            const gexData = slicedData.map(d => d.metrics.gex);
            const dixData = slicedData.map(d => d.metrics.dix);

            // 动态修改 SVG 的 path
            document.getElementById('path-vix').setAttribute('d', generateSvgPath(vixData));
            document.getElementById('path-skew').setAttribute('d', generateSvgPath(skewData));
            document.getElementById('path-gex').setAttribute('d', generateSvgPath(gexData));
            document.getElementById('path-dix').setAttribute('d', generateSvgPath(dixData));
        }

        // 初始化加载数据
        async function initDashboard() {
            try {
                const res = await fetch('./database/master_series.json?t=' + Date.now());
                if (!res.ok) throw new Error('File not found');
                globalData = await res.json();
                
                if (globalData.length === 0) return;

                // 拿到数组最后一天的最新数据
                const latest = globalData[globalData.length - 1];
                document.getElementById('update-time').innerText = `更新于: ${latest.timestamp}`;

                // 填充大字看板
                document.getElementById('val-vix').innerText = latest.metrics.vix.toFixed(2);
                document.getElementById('val-skew').innerText = latest.metrics.skew.toFixed(1);
                document.getElementById('val-gex').innerText = `$${(latest.metrics.gex / 1e9).toFixed(1)}B`;
                document.getElementById('val-dix').innerText = `${(latest.metrics.dix * 100).toFixed(1)}%`;

                // 填充 Polymarket
                let polyHtml = '';
                latest.polymarket.forEach(event => {
                    polyHtml += `
                        <div class="bg-slate-900/60 p-3 rounded-lg border border-slate-700/80">
                            <div class="text-sm text-slate-200 mb-2">${event.title}</div>
                            <div class="flex justify-between text-[10px] text-blue-400 font-mono mb-1">
                                <span>市场押注概率</span><span>${event.prob.toFixed(1)}%</span>
                            </div>
                            <div class="w-full bg-slate-950 rounded-full h-1.5"><div class="bg-blue-500 h-1.5 rounded-full" style="width: ${event.prob}%"></div></div>
                        </div>`;
                });
                document.getElementById('poly-container').innerHTML = polyHtml || '<div class="text-xs text-slate-500">暂无数据</div>';

                // 默认画出过去 30 天的趋势线
                updateCharts(30);

            } catch (error) {
                console.error(error);
                document.getElementById('update-time').innerText = "读取数据库失败，请检查 Actions 运行状态";
            }
        }

        // 绑定按钮点击事件：零延迟切换时间
        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                // 按钮高亮切换
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('bg-slate-700', 'text-white'));
                e.target.classList.add('bg-slate-700', 'text-white');
                // 执行纯前端内存重绘图表
                updateCharts(parseInt(e.target.dataset.days));
            });
        });

        initDashboard();
    </script>
</body>
</html>
